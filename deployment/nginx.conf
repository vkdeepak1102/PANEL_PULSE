##############################################################
# nginx — Panel Pulse AI
# Place at: /etc/nginx/sites-available/panel-pulse
# Enable : sudo ln -s /etc/nginx/sites-available/panel-pulse \
#                     /etc/nginx/sites-enabled/panel-pulse
##############################################################

server {
    listen 80;
    server_name 10.10.142.91;

    # ── Frontend (React SPA) ─────────────────────────────────
    root /opt/panel-pulse/frontend/dist;
    index index.html;

    # SPA fallback: unknown paths → index.html (React Router)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Backend API proxy ────────────────────────────────────
    location /api/ {
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;

        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        'upgrade';

        proxy_read_timeout  120s;
        proxy_send_timeout  120s;
        proxy_connect_timeout 10s;

        # Allow large uploads (transcripts, CSVs)
        client_max_body_size 20M;
    }

    # ── Security headers ─────────────────────────────────────
    add_header X-Frame-Options       "SAMEORIGIN"   always;
    add_header X-Content-Type-Options "nosniff"      always;
    add_header Referrer-Policy       "no-referrer"  always;

    # ── Gzip compression ─────────────────────────────────────
    gzip on;
    gzip_types text/plain text/css application/json
               application/javascript text/xml
               application/xml application/xml+rss text/javascript;
    gzip_min_length 256;
}
